{{- if .Values.autoSleepHook.enabled }}
{{- $runId := include "vllm-bootstrap.runId" . -}}
{{- $jobName := printf "%s-auto-sleep-%s" (include "vllm-bootstrap.fullname" .) $runId | trunc 63 | trimSuffix "-" -}}
{{- $coreRelease := .Values.coreReleaseName -}}
{{- $modelsByNode := dict -}}
{{- range $modelSpec := (index .Values "vllm-stack").servingEngineSpec.modelSpec }}
{{- $nodeName := default "default" $modelSpec.nodeName -}}
{{- $nodeModels := get $modelsByNode $nodeName | default (list) -}}
{{- $_ := set $modelsByNode $nodeName (append $nodeModels $modelSpec) -}}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $jobName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vllm-bootstrap.labels" . | nindent 4 }}
    vllm-bootstrap/run-id: {{ $runId | quote }}
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ add (int .Values.autoSleepHook.timeoutSeconds) 300 }}
  {{- if .Values.autoSleepHook.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.autoSleepHook.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "vllm-bootstrap.labels" . | nindent 8 }}
        vllm-bootstrap/run-id: {{ $runId | quote }}
    spec:
      restartPolicy: Never
      containers:
        - name: auto-sleep
          image: {{ .Values.autoSleepHook.image | quote }}
          imagePullPolicy: {{ .Values.autoSleepHook.imagePullPolicy }}
          env:
            - name: AUTO_SLEEP_TIMEOUT_SECONDS
              value: {{ .Values.autoSleepHook.timeoutSeconds | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              pids=""
              {{- range $nodeName := keys $modelsByNode | sortAlpha }}
              (
                NODE={{ $nodeName | quote }}
                export NODE
                NODE_TIMEOUT="${AUTO_SLEEP_TIMEOUT_SECONDS:-1800}"
                NODE_START_TS=$$(date +%s)
                REMAINING_ENGINE_URLS="{{- range $modelSpec := get $modelsByNode $nodeName }} {{ printf "http://%s-%s-engine-service:80" $coreRelease $modelSpec.name }}{{- end }}"
                while [ -n "$${REMAINING_ENGINE_URLS# }" ]; do
                  SELECTED_ENGINE_URL=""
                  for ENGINE_CANDIDATE in $$REMAINING_ENGINE_URLS; do
                    if ENGINE_URL="$$ENGINE_CANDIDATE" python3 -c "import os, urllib.request; urllib.request.urlopen(os.environ['ENGINE_URL'] + '/health', timeout=2)" 2>/dev/null; then
                      SELECTED_ENGINE_URL="$$ENGINE_CANDIDATE"
                      break
                    fi
                  done
                  if [ -z "$$SELECTED_ENGINE_URL" ]; then
                    NOW=$$(date +%s)
                    AGE=$$((NOW - NODE_START_TS))
                    if [ "$$AGE" -ge "$$NODE_TIMEOUT" ]; then
                      echo "[auto-sleep][$$NODE] Timeout nach $${AGE}s beim Warten auf ein ready Modell"
                      exit 1
                    fi
                    sleep 5
                    continue
                  fi
                  ENGINE_URL="$$SELECTED_ENGINE_URL"
                  export ENGINE_URL
                  echo "[auto-sleep][$$NODE] Bearbeite $$ENGINE_URL"
                  /scripts/auto-sleep.sh
                  NEXT_ENGINE_URLS=""
                  for ENGINE_CANDIDATE in $$REMAINING_ENGINE_URLS; do
                    if [ "$$ENGINE_CANDIDATE" != "$$SELECTED_ENGINE_URL" ]; then
                      NEXT_ENGINE_URLS="$$NEXT_ENGINE_URLS $$ENGINE_CANDIDATE"
                    fi
                  done
                  REMAINING_ENGINE_URLS="$$NEXT_ENGINE_URLS"
                done
              ) &
              pids="$pids $!"
              {{- end }}
              status=0
              for pid in $pids; do
                wait "$pid" || status=1
              done
              exit "$status"
          volumeMounts:
            - name: vllm-scripts
              mountPath: /scripts
            - name: preloaded-model-cache
              mountPath: /data
      volumes:
        - name: vllm-scripts
          configMap:
            name: {{ printf "%s-scripts" $coreRelease }}
            defaultMode: 0755
        - name: preloaded-model-cache
          persistentVolumeClaim:
            claimName: {{ .Values.preloadedModelCache.claimName }}
{{- end }}
