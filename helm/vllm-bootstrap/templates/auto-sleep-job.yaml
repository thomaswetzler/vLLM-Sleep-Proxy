{{- if .Values.autoSleepHook.enabled }}
{{- $runId := include "vllm-bootstrap.runId" . -}}
{{- $jobName := printf "%s-auto-sleep-%s" (include "vllm-bootstrap.fullname" .) $runId | trunc 63 | trimSuffix "-" -}}
{{- $coreRelease := .Values.coreReleaseName -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $jobName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vllm-bootstrap.labels" . | nindent 4 }}
    vllm-bootstrap/run-id: {{ $runId | quote }}
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ add (int .Values.autoSleepHook.timeoutSeconds) 300 }}
  {{- if .Values.autoSleepHook.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.autoSleepHook.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "vllm-bootstrap.labels" . | nindent 8 }}
        vllm-bootstrap/run-id: {{ $runId | quote }}
    spec:
      restartPolicy: Never
      containers:
        - name: auto-sleep
          image: {{ .Values.autoSleepHook.image | quote }}
          imagePullPolicy: {{ .Values.autoSleepHook.imagePullPolicy }}
          env:
            - name: AUTO_SLEEP_TIMEOUT_SECONDS
              value: {{ .Values.autoSleepHook.timeoutSeconds | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              pids=""
              {{- range $modelSpec := (index .Values "vllm-stack").servingEngineSpec.modelSpec }}
              (
                NODE={{ default "default" $modelSpec.nodeName | quote }}
                ENGINE_URL={{ printf "http://%s-%s-engine-service:80" $coreRelease $modelSpec.name | quote }}
                export NODE ENGINE_URL
                /scripts/auto-sleep.sh
              ) &
              pids="$pids $!"
              {{- end }}
              status=0
              for pid in $pids; do
                wait "$pid" || status=1
              done
              exit "$status"
          volumeMounts:
            - name: vllm-scripts
              mountPath: /scripts
            - name: preloaded-model-cache
              mountPath: /data
      volumes:
        - name: vllm-scripts
          configMap:
            name: {{ printf "%s-scripts" $coreRelease }}
            defaultMode: 0755
        - name: preloaded-model-cache
          persistentVolumeClaim:
            claimName: {{ .Values.preloadedModelCache.claimName }}
{{- end }}
