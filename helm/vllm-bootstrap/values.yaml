# Shared PVC created by helm/models.
preloadedModelCache:
  claimName: vllm-model-cache

# Name of the already deployed core release that owns the engine Services and
# the shared scripts ConfigMap (<coreReleaseName>-scripts).
coreReleaseName: vllm

autoSleepHook:
  enabled: true
  image: python:3.12-slim
  imagePullPolicy: IfNotPresent
  timeoutSeconds: 1800
  warmupRequestTimeoutSeconds: 300
  sleepRequestTimeoutSeconds: 120
  ttlSecondsAfterFinished: null
  # Required per deploy so the Job is recreated on every rollout.
  runId: ""

sleepMode:
  level: 1

# Keep this structure aligned with helm/vllm/values.yaml so the bootstrap chart
# can consume the exact same model lane configuration.
vllm-stack:
  servingEngineSpec:
    modelSpec: []
