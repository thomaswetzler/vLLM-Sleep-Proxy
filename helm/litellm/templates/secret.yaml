{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "litellm.secretName" . }}
  labels:
    {{- include "litellm.labels" . | nindent 4 }}
type: Opaque
stringData:
  LITELLM_MASTER_KEY: {{ .Values.secret.data.masterKey | quote }}
  {{- if .Values.secret.data.databaseUrl }}
  DATABASE_URL: {{ .Values.secret.data.databaseUrl | quote }}
  {{- end }}
  {{- if .Values.secret.data.openrouterApiKey }}
  OPENROUTER_API_KEY: {{ .Values.secret.data.openrouterApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.data.redisPassword }}
  REDIS_PASSWORD: {{ .Values.secret.data.redisPassword | quote }}
  {{- end }}
{{- end }}
