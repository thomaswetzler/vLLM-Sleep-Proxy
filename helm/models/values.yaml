pvc:
  create: true
  name: vllm-model-cache
  storageClass: longhorn
  size: 80Gi
  accessMode: ReadWriteMany
  labels: {}
  annotations: {}

templatePvc:
  create: true
  name: vllm-templates-pvc
  storageClass: longhorn
  size: 256Mi
  accessMode: ReadWriteMany
  labels: {}
  annotations: {}

huggingfaceCredentials:
  enabled: true
  secretName: huggingface-credentials
  secretKey: HUGGING_FACE_HUB_TOKEN
  # Set via CLI from env, e.g.:
  # --set-string huggingfaceCredentials.token="$HUGGING_FACE_TOKEN"
  token: ""

loader:
  enabled: true
  job:
    backoffLimit: 3
    ttlSecondsAfterFinished: null
  image:
    repository: python
    tag: 3.11-slim
    pullPolicy: IfNotPresent
  mountPath: /data
  modelRoot: /data/models
  templateRoot: /templates
  hfHome: /data/.hf-home
  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "8Gi"
  models:
    # CPU Embeddings-Lane. TEI erwartet genau diesen stabilen lokalen Pfad.
    - id: BAAI/bge-large-en-v1.5
      enabled: true
      path: baai-bge-large-en-v1.5

    # Hauptmodell fuer Chat, RAG und Dokumentanalyse.
    - id: google/gemma-4-12B-it-qat-w4a16-ct
      enabled: true
      path: gemma-4-12b-it

    # Alternatives High-End-Modell fuer Agenten und komplexeres Reasoning.
    - id: Qwen/Qwen3-14B-FP8
      enabled: true
      path: qwen3-14b-fp8

    # Coding-Lane auf lab02.
    - id: Qwen/Qwen2.5-Coder-7B-Instruct-AWQ
      enabled: true
      path: qwen2.5-coder-7b-instruct

    # Reasoning-/Troubleshooting-Lane auf lab02.
    - id: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
      enabled: true
      path: deepseek-r1-distill-qwen-7b

    # Optional vorbereitete llama.cpp-Lane fuer spaeter.
    - id: bartowski/Qwen2.5-72B-Instruct-GGUF
      enabled: false
      path: qwen2.5-72b-instruct
      allowPatterns:
        - Qwen2.5-72B-Instruct-Q4_K_M.gguf

    # Vorbereitete VLM-Lane, aktuell kein Default fuer den neuen vLLM-Katalog.
    - id: bartowski/Qwen_Qwen2.5-VL-7B-Instruct-GGUF
      enabled: false
      path: qwen2.5-vl-7b-instruct
      allowPatterns:
        - Qwen_Qwen2.5-VL-7B-Instruct-Q4_K_M.gguf
        - mmproj-Qwen_Qwen2.5-VL-7B-Instruct-f16.gguf

    # Chandra bleibt vorerst nur vorbereitet, aber nicht Teil des Default-
    # Downloadpfads fuer den neuen Zielzustand.
    - id: datalab-to/chandra-ocr-2
      enabled: false
      path: chandra-ocr-2
      allowPatterns:
        - "*.json"
        - "*.safetensors"
        - "*.jinja"

  # Optional additive overlay for extra cache-only models. This keeps the
  # default model set extensible while still allowing targeted future
  # downloads via an extra values overlay.
  extraModels: []
  templates:
    - enabled: true
      name: tool_chat_template_llama3.1_json.jinja
      url: https://raw.githubusercontent.com/vllm-project/vllm/main/examples/tool_chat_template_llama3.1_json.jinja
