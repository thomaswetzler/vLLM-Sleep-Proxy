{{- if .Values.huggingfaceCredentials.enabled }}
{{- $token := .Values.huggingfaceCredentials.token | default "" -}}
{{- if eq $token "" }}
{{- fail "huggingfaceCredentials.token is empty. Pass it via --set-string huggingfaceCredentials.token=\"$HUGGING_FACE_TOKEN\"." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.huggingfaceCredentials.secretName | default "huggingface-credentials" }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  {{ .Values.huggingfaceCredentials.secretKey | default "HUGGING_FACE_HUB_TOKEN" }}: {{ $token | quote }}
{{- end }}
