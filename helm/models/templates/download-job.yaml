{{- if .Values.loader.enabled }}
{{- if not .Values.loader.models }}
{{- fail "loader.models must contain at least one model entry." }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "model-loader.fullname" . }}-download
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "model-loader.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.loader.job.backoffLimit }}
  {{- if .Values.loader.job.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.loader.job.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "model-loader.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: downloader
          image: "{{ .Values.loader.image.repository }}:{{ .Values.loader.image.tag }}"
          imagePullPolicy: {{ .Values.loader.image.pullPolicy }}
          env:
            - name: HF_HOME
              value: {{ .Values.loader.hfHome | quote }}
            - name: MODEL_ROOT
              value: {{ .Values.loader.modelRoot | quote }}
            - name: TEMPLATE_ROOT
              value: {{ .Values.loader.templateRoot | quote }}
            - name: MODELS_JSON
              value: {{ toJson .Values.loader.models | quote }}
            - name: TEMPLATES_JSON
              value: {{ toJson .Values.loader.templates | quote }}
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
            {{- if .Values.huggingfaceCredentials.enabled }}
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.huggingfaceCredentials.secretName }}
                  key: {{ .Values.huggingfaceCredentials.secretKey }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.huggingfaceCredentials.secretName }}
                  key: {{ .Values.huggingfaceCredentials.secretKey }}
            {{- end }}
          command:
            - sh
            - -c
            - |
              pip install -q huggingface_hub hf_transfer && python3 -c "
              import json
              import os
              import urllib.request
              from concurrent.futures import ThreadPoolExecutor, as_completed
              from huggingface_hub import snapshot_download

              models = [
                  model
                  for model in json.loads(os.environ['MODELS_JSON'])
                  if model.get('enabled', True)
              ]
              templates = [
                  template
                  for template in json.loads(os.environ['TEMPLATES_JSON'])
                  if template.get('enabled', True)
              ]
              model_root = os.environ.get('MODEL_ROOT', '/data/models')
              template_root = os.environ.get('TEMPLATE_ROOT', '/templates')
              token = os.environ.get('HUGGING_FACE_HUB_TOKEN') or os.environ.get('HF_TOKEN')
              os.makedirs(model_root, exist_ok=True)
              os.makedirs(template_root, exist_ok=True)

              if not models:
                  raise SystemExit('No enabled models configured for download.')

              for template in templates:
                  template_name = template['name']
                  template_url = template['url']
                  local_path = os.path.join(template_root, template_name)
                  print(f'Downloading template {template_url} -> {local_path}', flush=True)
                  with urllib.request.urlopen(template_url) as response:
                      with open(local_path, 'wb') as fh:
                          fh.write(response.read())
                  print(f'Done: {template_name}', flush=True)

              def download_model(model):
                  model_id = model['id']
                  rel_path = model.get('path') or model_id.replace('/', '--')
                  revision = model.get('revision')
                  local_dir = os.path.join(model_root, rel_path)
                  os.makedirs(local_dir, exist_ok=True)
                  print(f'Downloading {model_id} -> {local_dir}', flush=True)
                  kwargs = {
                      'repo_id': model_id,
                      'local_dir': local_dir,
                      'local_dir_use_symlinks': False,
                      'max_workers': 8,
                  }
                  if token:
                      kwargs['token'] = token
                  if revision:
                      kwargs['revision'] = revision
                  snapshot_download(**kwargs)
                  print(f'Done: {model_id}', flush=True)
                  return model_id

              with ThreadPoolExecutor(max_workers=max(1, len(models))) as executor:
                  futures = {executor.submit(download_model, m): m for m in models}
                  for future in as_completed(futures):
                      future.result()

              print('All models downloaded.')
              "
          resources:
            {{- toYaml .Values.loader.resources | nindent 12 }}
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.loader.mountPath }}
            - name: template-cache
              mountPath: {{ .Values.loader.templateRoot }}
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ .Values.pvc.name }}
        - name: template-cache
          persistentVolumeClaim:
            claimName: {{ .Values.templatePvc.name }}
{{- end }}
