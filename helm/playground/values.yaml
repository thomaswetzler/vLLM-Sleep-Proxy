replicaCount: 1

image:
  repository: ghcr.io/thomaswetzler/playground
  tag: "latest"
  pullPolicy: Always

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 7860
  targetPort: 7860

ingress:
  enabled: true
  className: cilium
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: vllm-playground.k3s.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: vllm-playground-tls
      hosts:
        - vllm-playground.k3s.example.com

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "2"
    memory: "4Gi"

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

huggingfaceSecret:
  enabled: true
  name: huggingface-credentials
  key: HUGGING_FACE_HUB_TOKEN
  optional: true

bootstrap:
  settings:
    theme: dark
    locale: en

# The first entry becomes the initial remote URL in settings.json.
# LiteLLM is the canonical entry point — it exposes all models (chat, embeddings,
# whisper) behind a single OpenAI-compatible API. The sleep-proxy and vLLM router
# are included as additional targets for debugging the wake/sleep layer directly.
remoteTargets:
  - name: LiteLLM
    url: http://lite-helm-litellm.vllm.svc.cluster.local:4000
    apiKey: ""
    description: Unified OpenAI-compatible endpoint routing chat, embeddings and transcription through LiteLLM
  - name: Sleep Proxy
    url: http://sleep-proxy-service.vllm.svc.cluster.local:8080
    apiKey: ""
    description: Direct in-cluster sleep-proxy endpoint for debugging the wake/sleep layer
  - name: vLLM Router
    url: http://vllm-router-service.vllm.svc.cluster.local:80
    apiKey: ""
    description: Internal vLLM router service without sleep/wake mediation

mcpServers: []

extraEnv: []

nodeSelector: {}

tolerations: []

affinity: {}
