litellm:
  # Keep the service DNS stable for ops-ui and playground defaults.
  fullnameOverride: lite-helm-litellm

llama-cpp-engine:
  # The hybrid runtime path stays opt-in until a GGUF model file and image are
  # prepared for the target node. See values.llama-cpp-example.yaml for a text
  # model lane and values.llama-cpp-vl-example.yaml for a vision lane.
  engines: []

playground:
  # Preserve the existing service/ingress object names when deployed via the
  # umbrella release.
  fullnameOverride: playground
